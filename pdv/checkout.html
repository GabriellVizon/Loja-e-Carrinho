<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>TechStore — Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="logo">🖥 TechStore</span>
    <a class="btn-voltar" href="carrinho.html">← Voltar ao carrinho</a>
  </header>

  <main class="checkout-layout">

    <!-- Formulário do cliente -->
    <div class="form-section">
      <h1>Dados do cliente</h1>

      <label>Nome completo
        <input type="text" id="nome" placeholder="Ex: João Silva" />
      </label>
      <label>E-mail
        <input type="email" id="email" placeholder="Ex: joao@email.com" />
      </label>
      <label>CPF
        <input type="text" id="cpf" placeholder="Ex: 000.000.000-00" maxlength="14" />
      </label>
      <label>Telefone
        <input type="text" id="telefone" placeholder="Ex: (11) 99999-9999" maxlength="15" />
      </label>

      <h2 style="margin-top:24px">Pagamento</h2>
      <div class="pagamento-opcoes">
        <label class="opcao-pag">
          <input type="radio" name="pagamento" value="credito" checked /> Cartão de crédito
        </label>
        <label class="opcao-pag">
          <input type="radio" name="pagamento" value="pix" /> PIX
        </label>
        <label class="opcao-pag">
          <input type="radio" name="pagamento" value="boleto" /> Boleto
        </label>
      </div>

      <div id="erroCampos" class="erro" style="display:none"></div>
      <button class="btn-primary" onclick="finalizarPedido()">✅ Confirmar pedido</button>
    </div>

    <!-- Resumo do pedido -->
    <div class="resumo-checkout">
      <h2>Resumo do pedido</h2>
      <div id="itensResumo"></div>
      <div class="resumo-linha destaque" style="margin-top:16px">
        <span>Total</span>
        <span id="totalCheckout"></span>
      </div>
    </div>

    <h2>Cupom de desconto</h2>
    <div class="cupom-box">
      <input type="text" id="cupomInput" placeholder="Digite seu cupom" />
      <button class="btn-cupom" onclick="aplicarCupom()">Aplicar</button>
    </div>

    <div id="erroCupom" class="erro" style="display: none;"></div>

    <div id="sucessoCupom" class="sucesso" style="display: none;"></div>

    <div class="resumo-linha desconto" id="LinhDesconto" style="display: none;">
      <span>Desconto</span>
      <span id="valorDesconto"></span>
    </div>
    <div class="resumo-linha destaque" id="linhaTotalFinal" style="display: none;">
      <span>Total com desconto</span>
      <span id="totalFinal"></span>
    </div>

  </main>

  <!-- Recibo final (oculto até confirmar) -->
  <div id="recibo" style="display:none">
    <div class="recibo-box">
      <div class="recibo-ok">✅</div>
      <h2>Pedido confirmado!</h2>
      <p id="reciboCliente"></p>
      <div id="reciboItens"></div>
      <div class="resumo-linha destaque" style="margin-top:12px">
        <span>Total pago</span>
        <span id="reciboTotal"></span>
      </div>
      <p id="reciboPagamento" class="recibo-msg-pag"></p>
      <button class="btn-primary" onclick="novaCompra()">🛍 Nova compra</button>
    </div>
  </div>

  <script src="produtos.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
